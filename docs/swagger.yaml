info:
  contact: {}
  description: fox-admin 后台管理接口文档
  title: fox-admin API
  version: 1.0.0
paths:
  /api/v1/system/auth/login:
    post:
      consumes:
      - application/json
      description: 使用后台账号密码登录并签发 access token 和 refresh token
      parameters:
      - description: 设备 ID
        in: header
        name: X-Device-ID
        type: string
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 系统认证
  /api/v1/system/auth/logout:
    post:
      description: 吊销当前 access token 对应的登录会话
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 退出登录
      tags:
      - 系统认证
  /api/v1/system/auth/refresh:
    post:
      description: 使用请求头中的 refresh token 轮换登录凭证
      parameters:
      - description: Refresh Token
        in: header
        name: X-Refresh-Token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 刷新登录凭证
      tags:
      - 系统认证
  /api/v1/system/auth/routers:
    get:
      description: 查询当前登录用户通过角色获得的 Arco Pro 动态路由树
      produces:
      - application/json
      responses:
        "200":
          description: 动态路由树
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询当前用户动态路由
      tags:
      - 系统认证
  /api/v1/system/auth/user-info:
    get:
      description: 查询当前登录用户、角色编码和权限标识
      produces:
      - application/json
      responses:
        "200":
          description: 当前用户信息
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询当前用户信息
      tags:
      - 系统认证
  /api/v1/system/menu/create:
    post:
      consumes:
      - application/json
      description: 创建目录、页面菜单或外链菜单
      parameters:
      - description: 创建菜单请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/menu.CreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建菜单
      tags:
      - 系统菜单
  /api/v1/system/menu/delete:
    post:
      consumes:
      - application/json
      description: 删除没有子菜单、角色绑定和操作权限的菜单
      parameters:
      - description: 删除菜单请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/menu.DeleteReq'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 删除菜单
      tags:
      - 系统菜单
  /api/v1/system/menu/detail:
    get:
      description: 根据菜单 ID 查询菜单详情
      parameters:
      - description: 菜单 ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 菜单详情
          schema:
            additionalProperties: true
            type: object
        "500":
