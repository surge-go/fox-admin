      summary: 查询菜单树
      tags:
      - 系统菜单
  /api/v1/system/menu/update:
    post:
      consumes:
      - application/json
      description: 更新菜单路由和展示配置
      parameters:
      - description: 更新菜单请求
        in: body
        name: request
        required: true
