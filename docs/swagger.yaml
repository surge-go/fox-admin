          schema:
            additionalProperties: true
            type: object
      summary: 查询菜单详情
      tags:
      - 系统菜单
  /api/v1/system/menu/options:
    get:
      description: 查询启用菜单树及菜单下的启用操作权限
      produces:
      - application/json
      responses:
        "200":
          description: 菜单资源选项
          schema:
