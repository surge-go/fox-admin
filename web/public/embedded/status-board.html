<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>监控看板</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #f8fafc;
        color: #0f172a;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      .board {
        display: grid;
        gap: 16px;
      }

      .hero {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .hero h1 {
        font-size: 24px;
        margin: 0;
      }

      .hero p {
        color: #64748b;
        margin: 6px 0 0;
      }

      .metrics {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
      }

      .card span {
        color: #64748b;
        display: block;
        font-size: 13px;
      }

      .card strong {
        display: block;
        font-size: 28px;
        margin-top: 10px;
      }

      .timeline {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
      }

      .timeline h2 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      .timeline ul {
        display: grid;
        gap: 10px;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .timeline li {
        border-left: 3px solid #2563eb;
        padding-left: 12px;
      }

      .timeline time {
        color: #64748b;
        display: block;
        font-size: 12px;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <main class="board">
      <section class="hero">
        <div>
          <h1>监控看板</h1>
          <p>这是通过菜单路由 link 字段以内嵌 iframe 方式渲染的示例页面。</p>
        </div>
      </section>

      <section class="metrics">
        <article class="card">
          <span>服务可用率</span>
          <strong>99.98%</strong>
        </article>
        <article class="card">
          <span>任务积压</span>
          <strong>14</strong>
        </article>
        <article class="card">
          <span>链路告警</span>
          <strong>2</strong>
        </article>
      </section>

      <section class="timeline">
        <h2>最近事件</h2>
        <ul>
          <li>
            <time>09:30</time>
            任务队列已恢复到正常水位
          </li>
          <li>
            <time>09:12</time>
            网关实例完成滚动发布
          </li>
          <li>
            <time>08:47</time>
            缓存命中率回升至 91%
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
